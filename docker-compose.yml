services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: monal
      POSTGRES_PASSWORD: monal_secret
      POSTGRES_DB: monal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monal -d monal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://monal:monal_secret@db:5432/monal
      CORS_ORIGIN: http://localhost:3000
      API_SECRET_KEY: local-dev-secret
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://monal:monal_secret@db:5432/monal
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_SECRET_KEY: local-dev-secret
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres_data:
